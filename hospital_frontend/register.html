<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: url("register.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        /* Optional table styling for clarity */
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        h3 {
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<h2>Patient Registration</h2>

<nav>
    <a href="index.html">Home</a>
</nav>

<div class="container">

    <!-- MESSAGE BOX -->
    <p id="message" style="display:none; padding:10px; border-radius:5px; font-weight:bold;"></p>

    <!-- REGISTRATION FORM -->
    <form id="patientForm">

        <input 
            type="text" 
            id="name" 
            placeholder="Patient Name" 
            required
        ><br><br>

        <input 
            type="number" 
            id="age" 
            placeholder="Age" 
            required
        ><br><br>

        <input 
            type="text" 
            id="gender" 
            placeholder="Gender (Male/Female)" 
            required
        ><br><br>

        <button type="submit">Register</button>

    </form>

</div>

<!-- =========================================================
     REGISTERED PATIENTS TABLE
========================================================= -->

<h3>Registered Patients</h3>

<table id="patientsTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
        </tr>
    </thead>
    <tbody>
        <!-- Data will load here dynamically -->
    </tbody>
</table>

<script src="script.js"></script>

</body>
</html>
